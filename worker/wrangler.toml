name = "deals-agent"
main = "src/index.ts"
compatibility_date = "2024-12-05"

[triggers]
crons = [
  "0 6 * * *",   # 08:00 Israel (UTC+2) — morning digest
  "0 11 * * *"   # 13:00 Israel — afternoon deals
]

[[d1_databases]]
binding = "DB"
database_name = "deals-agent-db"
database_id = "7552528f-afbf-4638-a1b4-bf377d38127e"

[vars]
WORKER_URL = "https://deals-agent.lsabag.workers.dev"
