<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Deals Digest</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#f97316"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --border:#1e1e2e;
  --text:#e2e8f0; --muted:#64748b; --hint:#475569;
  --orange:#f97316; --green:#10b981; --indigo:#818cf8;
  --pink:#ec4899; --red:#ef4444;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Hebrew',Arial,sans-serif;
  min-height:100dvh;overscroll-behavior:none;
  padding-top:var(--safe-top);padding-bottom:calc(68px + var(--safe-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 18px 10px}
.header-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:700;color:var(--orange)}
.refresh-btn{border:1px solid var(--border);border-radius:9px;color:var(--muted);
  padding:6px 12px;font-size:12px;transition:all .15s}
.refresh-btn:active{background:var(--surface)}
.subtitle{font-size:11px;color:var(--muted);margin-top:3px}
.badge{background:var(--orange);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700;margin-right:5px}

/* Filters */
.filters{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;border:1px solid var(--border);border-radius:99px;
  background:var(--surface);color:var(--muted);padding:5px 13px;font-size:12px;
  white-space:nowrap;transition:all .2s}
.filter-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.1)}

/* Feed */
.feed{padding:0 14px;display:flex;flex-direction:column;gap:9px;padding-bottom:20px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:15px;
  overflow:hidden;transition:transform .15s,opacity .15s;user-select:none;
  animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card.liked{border-color:rgba(16,185,129,.4)}
.card.disliked{border-color:rgba(239,68,68,.2);opacity:.55}
.card-image{width:100%;height:160px;object-fit:cover;display:block}
.card.swiping-right{transform:translateX(80px) rotate(4deg);opacity:.5}
.card.swiping-left{transform:translateX(-80px) rotate(-4deg);opacity:.5}

.card-body{padding:12px 14px}
.card-sender{font-size:11px;font-weight:700;margin-bottom:3px}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.card-subject{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:3px}
.card-summary{font-size:12px;color:var(--muted);line-height:1.5}
.card-emoji{font-size:22px;flex-shrink:0;margin-top:2px}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.tag-discount{background:rgba(249,115,22,.15);color:var(--orange)}
.tag-best{background:rgba(16,185,129,.15);color:var(--green)}
.tag-warn{background:rgba(239,68,68,.12);color:var(--red)}
.tag-cat{background:rgba(129,140,248,.15);color:var(--indigo)}

.interest-dots{display:flex;gap:3px;margin-top:7px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--orange)}

.card-actions{display:flex;border-top:1px solid var(--border)}
.act-btn{flex:1;padding:11px 4px;text-align:center;font-size:19px;transition:background .15s}
.act-btn:active{background:rgba(255,255,255,.05)}
.act-btn.like:active{background:rgba(16,185,129,.1)}
.act-btn.dislike:active{background:rgba(239,68,68,.08)}
.act-divider{width:1px;background:var(--border)}

/* Expand complex card */
.sub-deals{border-top:1px solid var(--border);display:none}
.sub-deals.open{display:block}
.sub-deal{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sub-deal:last-child{border-bottom:none}
.sub-deal-name{font-size:12px;font-weight:600}
.sub-deal-price{font-size:11px;color:var(--muted)}

/* Toast */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(16px);opacity:0;transition:all .28s;
  background:#1e1e2e;border:1px solid var(--border);border-radius:11px;
  padding:9px 16px;font-size:12px;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-undo{color:var(--orange);margin-right:8px;pointer-events:all;cursor:pointer;font-weight:600}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,10,15,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;border:none;background:none;padding:10px 4px 9px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-family:inherit;transition:color .2s}
.nav-btn.active{color:var(--orange)}
.nav-btn .nav-icon{font-size:19px}
.nav-btn .nav-label{font-size:9px;font-weight:600}

/* Views */
.view{display:none}
.view.active{display:block}

/* Archive view */
.archive-section{padding:14px 16px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.archive-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  margin-bottom:7px;overflow:hidden}
.archive-item-body{padding:9px 13px;display:flex;justify-content:space-between;align-items:center}
.archive-restore{color:var(--green);font-size:11px;font-weight:700;padding:6px 10px}

/* Preferences view */
.pref-section{padding:14px 18px}
.pref-title{font-size:15px;font-weight:700;margin-bottom:12px}
.pref-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.pref-row:last-child{border-bottom:none}
.pref-bar{width:54px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pref-bar-fill{height:100%;border-radius:2px}

/* Settings view */
.settings-section{padding:14px 18px}
.setting-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:12px;overflow:hidden}
.setting-row{display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px}
.setting-row:last-child{border-bottom:none}
.setting-label{color:var(--muted);font-size:11px}
.setting-btn{background:rgba(249,115,22,.15);color:var(--orange);
  border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700}

/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;padding:32px;text-align:center;gap:20px}
.login-logo{font-size:56px}
.login-title{font-size:24px;font-weight:700;color:var(--orange)}
.login-desc{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px}
.google-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#333;
  border-radius:12px;padding:13px 22px;font-size:15px;font-weight:600;
  border:none;cursor:pointer;transition:opacity .2s}
.google-btn:active{opacity:.8}

/* Loading skeleton */
.shimmer{background:linear-gradient(90deg,#1a1a2e 25%,#252545 50%,#1a1a2e 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:9px}

/* Install banner */
.install-banner{margin:10px 16px;padding:11px 14px;background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.3);border-radius:11px;display:flex;
  justify-content:space-between;align-items:center;font-size:12px;display:none}
.install-btn{background:var(--indigo);color:#fff;border-radius:7px;
  padding:5px 11px;font-size:11px;font-weight:700}

.empty-state{text-align:center;padding:56px 20px;color:var(--hint)}
.empty-icon{font-size:44px;margin-bottom:12px}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" style="display:none">
  <div class="login-screen">
    <div class="login-logo">📬</div>
    <div class="login-title">Deals Digest</div>
    <div class="login-desc">סוכן חכם שמנהל את המבצעים שלך, לומד מה מעניין אותך, ומסדר את הכאוס.</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google"/>
      התחבר עם Google
    </button>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">

  <div class="header">
    <div class="header-row">
      <span class="logo">📬 Deals Digest</span>
      <button class="refresh-btn" onclick="loadDigest(true)">🔄 רענן</button>
    </div>
    <div class="subtitle" id="subtitle">טוען...</div>
  </div>

  <div class="install-banner" id="installBanner">
    <span>📲 התקן כאפליקציה לקבל התראות</span>
    <button class="install-btn" onclick="installApp()">התקן</button>
  </div>

  <!-- View: Digest -->
  <div class="view active" id="view-digest">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">🎯 הכל</button>
      <button class="filter-btn" onclick="setFilter('discount',this)">💸 הנחות</button>
      <button class="filter-btn" onclick="setFilter('interesting',this)">⭐ מעניין</button>
      <button class="filter-btn" onclick="setFilter('liked',this)">👍 אהבתי</button>
    </div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- View: Archive -->
  <div class="view" id="view-archive">
    <div class="archive-section">
      <div class="pref-title" style="margin-bottom:14px">📦 ארכיון</div>
      <div id="archive-content"></div>
    </div>
  </div>

  <!-- View: Preferences -->
  <div class="view" id="view-prefs">
    <div class="pref-section">
      <div class="pref-title">🧠 מה למדתי עליך</div>
      <div id="pref-list"></div>
    </div>
  </div>

  <!-- View: Settings -->
  <div class="view" id="view-settings">
    <div class="settings-section">
      <div class="pref-title">⚙️ הגדרות</div>
      <div class="setting-group">
        <div class="setting-row">
          <div><div style="font-size:13px">חשבון מחובר</div><div class="setting-label" id="user-email">טוען...</div></div>
          <button class="setting-btn" onclick="logout()">התנתק</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-row">
          <div><div style="font-size:13px">תיקיית חשבוניות</div><div class="setting-label" id="invoice-folder">לא הוגדר</div></div>
          <button class="setting-btn" onclick="pickFolder('חשבוניות')">שנה</button>
        </div>
        <div class="setting-row">
          <div><div style="font-size:13px">תיקיית מסמכי עסק</div><div class="setting-label" id="business-folder">לא הוגדר</div></div>
          <button class="setting-btn" onclick="pickFolder('עסקי')">שנה</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-row">
          <div style="font-size:13px">השתקות פעילות</div>
        </div>
        <div id="mutes-list"></div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showView('digest',this)"><span class="nav-icon">📬</span><span class="nav-label">דיגסט</span></button>
    <button class="nav-btn" onclick="showView('archive',this)"><span class="nav-icon">📦</span><span class="nav-label">ארכיון</span></button>
    <button class="nav-btn" onclick="showView('prefs',this)"><span class="nav-icon">🧠</span><span class="nav-label">העדפות</span></button>
    <button class="nav-btn" onclick="showView('settings',this)"><span class="nav-icon">⚙️</span><span class="nav-label">הגדרות</span></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const WORKER = 'https://deals-agent.lsabag.workers.dev';

// ── State ──
let token = localStorage.getItem('token');
let allCards = [];
let feedbackMap = JSON.parse(localStorage.getItem('feedback') || '{}');
let currentFilter = 'all';
let undoQueue = {};
let deferredInstall = null;

// ── Boot ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
  document.getElementById('installBanner').style.display = 'flex';
});

// Handle OAuth callback token in URL
const urlToken = new URLSearchParams(location.search).get('token');
if (urlToken) {
  localStorage.setItem('token', urlToken);
  token = urlToken;
  history.replaceState({}, '', '/');
}

if (token) {
  document.getElementById('app').style.display = 'block';
  loadDigest();
  loadUserInfo();
} else {
  document.getElementById('login-screen').style.display = 'block';
}

// ── Auth ──
function loginWithGoogle() {
  window.location.href = WORKER + '/auth/google';
}
function logout() {
  localStorage.clear();
  location.reload();
}
async function loadUserInfo() {
  try {
    const res = await api('/auth/me');
    document.getElementById('user-email').textContent = res.email || '';
  } catch {}
}

// ── Load digest ──
async function loadDigest(force = false) {
  const feed = document.getElementById('feed');
  feed.innerHTML = [1,2,3].map(() => `
    <div class="skeleton">
      <div class="shimmer" style="width:45%;height:13px;margin-bottom:9px"></div>
      <div class="shimmer" style="width:80%;height:11px;margin-bottom:7px"></div>
      <div class="shimmer" style="width:60%;height:10px"></div>
    </div>`).join('');

  try {
    const data = await api('/digest');
    allCards = data.cards || [];
    if (allCards.length === 0) {
      feed.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>אין מבצעים חדשים היום. נסה שוב מאוחר יותר.</p></div>';
      document.getElementById('subtitle').innerHTML = '0 מבצעים · ' + new Date().toLocaleDateString('he-IL');
      return;
    }
    renderFeed();
    setSubtitle();
  } catch (e) {
    console.error('Digest error:', e);
    feed.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>שגיאה בטעינה. נסה ללחוץ רענן.</p></div>';
  }
}

function setSubtitle() {
  const cnt = allCards.length;
  const disc = allCards.filter(c => c.deals?.some(d => d.discount_pct)).length;
  document.getElementById('subtitle').innerHTML =
    `<span class="badge">${cnt}</span>${cnt} מבצעים · ${disc} עם הנחה · ${new Date().toLocaleDateString('he-IL')}`;
}

// ── Render feed ──
function renderFeed() {
  const feed = document.getElementById('feed');
  let cards = [...allCards];

  if (currentFilter === 'discount') cards = cards.filter(c => c.deals?.some(d => d.discount_pct));
  if (currentFilter === 'interesting') cards = cards.filter(c => c.deals?.some(d => d.interest_score >= 4));
  if (currentFilter === 'liked') cards = cards.filter(c => feedbackMap[c.message_id] === 'liked');

  // Sort: liked first, then by score, disliked last
  cards.sort((a, b) => {
    const s = c => {
      const fb = feedbackMap[c.message_id];
      const boost = fb === 'liked' ? 5 : fb === 'disliked' ? -5 : 0;
      return boost + (c.score || 3);
    };
    return s(b) - s(a);
  });

  if (!cards.length) {
    feed.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><p>אין תוצאות לפילטר הזה</p></div>';
    return;
  }
  feed.innerHTML = cards.map((c, i) => cardHTML(c, i)).join('');
  cards.forEach(c => attachSwipe(c.message_id));
}

function cardHTML(card, i) {
  const fb = feedbackMap[card.message_id] || '';
  const topDeal = card.deals?.[0];
  const hasDiscount = topDeal?.discount_pct;
  const isInteresting = topDeal?.interest_score >= 4;
  const accent = hasDiscount ? 'var(--orange)' : isInteresting ? 'var(--indigo)' : 'var(--green)';
  const isComplex = card.type === 'complex' && card.deals?.length > 1;

  const dots = [1,2,3,4,5].map(n =>
    `<div class="dot${n <= (topDeal?.interest_score || 3) ? ' on' : ''}"></div>`
  ).join('');

  const tags = [
    topDeal?.discount_pct ? `<span class="tag tag-discount">💸 ${topDeal.discount_pct}% הנחה</span>` : '',
    topDeal?.price ? `<span class="tag tag-best">₪${topDeal.price}</span>` : '',
    card.category ? `<span class="tag tag-cat">${card.category}</span>` : '',
  ].filter(Boolean).join('');

  const priceLine = topDeal?.price ? `
    <div style="margin-top:6px;font-size:12px">
      <span style="color:var(--green);font-weight:700">₪${topDeal.price}</span>
      ${topDeal.original_price ? `<span style="color:var(--muted);text-decoration:line-through;margin-right:6px">₪${topDeal.original_price}</span>` : ''}
    </div>` : '';

  const subDeals = isComplex ? `
    <div class="sub-deals" id="sub-${card.message_id}">
      ${card.deals.map(item => `
        <div class="sub-deal">
          <div>
            <div class="sub-deal-name">${item.emoji || ''} ${esc(item.product)}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(item.summary)}</div>
          </div>
          <div class="sub-deal-price">${item.price ? '₪' + item.price : ''}${item.discount_pct ? '  -' + item.discount_pct + '%' : ''}</div>
        </div>`).join('')}
    </div>` : '';

  const senderName = extractSenderName(card.sender);

  const heroImage = card.image
    ? `<img class="card-image" src="${card.image}" alt="" loading="lazy" onerror="this.style.display='none'"/>`
    : '';

  return `
    <div class="card ${fb}" id="card-${card.message_id}" style="animation-delay:${i * 35}ms;border-right:3px solid ${accent}">
      ${heroImage}
      <div class="card-body" ${isComplex ? `onclick="toggleSub('${card.message_id}')"` : ''} style="${isComplex ? 'cursor:pointer' : ''}">
        <div style="display:flex;justify-content:space-between;gap:8px">
          <div style="flex:1;min-width:0">
            <div class="card-sender" style="color:${accent}">${esc(senderName)}</div>
            ${tags ? `<div class="card-meta">${tags}</div>` : ''}
            <div class="card-subject">${esc(topDeal?.product || card.subject)}</div>
            <div class="card-summary">${esc(topDeal?.summary || '')}</div>
            ${priceLine}
            <div class="interest-dots">${dots}</div>
          </div>
          <div class="card-emoji">${topDeal?.emoji || '📩'}${isComplex ? ` <span style="font-size:11px;color:var(--muted)">+${card.deals.length - 1}</span>` : ''}</div>
        </div>
      </div>
      ${subDeals}
      <div class="card-actions">
        <button class="act-btn like" onclick="giveFeedback('${card.message_id}','${esc(card.sender)}','${esc(card.subject)}','${esc(card.category)}','liked')">👍</button>
        <div class="act-divider"></div>
        <button class="act-btn dislike" onclick="giveFeedback('${card.message_id}','${esc(card.sender)}','${esc(card.subject)}','${esc(card.category)}','disliked')">👎</button>
      </div>
    </div>`;
}

function toggleSub(id) {
  const el = document.getElementById('sub-' + id);
  if (el) el.classList.toggle('open');
}

// ── Swipe ──
function attachSwipe(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  let startX = 0, dx = 0, dragging = false;

  const onStart = e => { startX = (e.touches?.[0] || e).clientX; dragging = true; };
  const onMove = e => {
    if (!dragging) return;
    dx = (e.touches?.[0] || e).clientX - startX;
    card.style.transform = `translateX(${dx}px) rotate(${dx * 0.03}deg)`;
    card.style.opacity = String(1 - Math.abs(dx) / 300);
  };
  const onEnd = () => {
    if (!dragging) return; dragging = false;
    card.style.transform = ''; card.style.opacity = '';
    const deal = allCards.find(c => c.message_id === id);
    if (!deal) return;
    if (dx > 60) giveFeedback(id, deal.sender, deal.subject, deal.category, 'liked');
    else if (dx < -60) giveFeedback(id, deal.sender, deal.subject, deal.category, 'disliked');
  };

  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove', onMove, { passive: true });
  card.addEventListener('touchend', onEnd);
  card.addEventListener('mousedown', onStart);
  card.addEventListener('mousemove', onMove);
  card.addEventListener('mouseup', onEnd);
  card.addEventListener('mouseleave', onEnd);
}

// ── Feedback ──
let toastTimer;
function giveFeedback(id, sender, subject, category, type) {
  const prev = feedbackMap[id];
  if (prev === type) { delete feedbackMap[id]; } else { feedbackMap[id] = type; }
  localStorage.setItem('feedback', JSON.stringify(feedbackMap));

  const card = document.getElementById('card-' + id);
  if (card) { card.className = 'card ' + (feedbackMap[id] || ''); }

  undoQueue[id] = { id, sender, subject, category, type: prev };
  clearTimeout(toastTimer);

  const msg = type === 'liked' ? '👍 נשמר! אלמד להציג יותר כאלה' : '👎 הבנתי, אסנן כאלה בהמשך';
  showToastWithUndo(msg, () => {
    feedbackMap[id] = prev;
    if (!prev) delete feedbackMap[id];
    localStorage.setItem('feedback', JSON.stringify(feedbackMap));
    if (card) card.className = 'card ' + (feedbackMap[id] || '');
    delete undoQueue[id];
  });

  toastTimer = setTimeout(() => {
    if (undoQueue[id]) {
      api('/feedback', {
        method: 'POST',
        body: JSON.stringify({
          message_id: id,
          sender,
          subject,
          category,
          liked: type === 'liked',
        }),
      }).catch(() => {});
      delete undoQueue[id];
    }
  }, 5000);
}

// ── Archive ──
function renderArchive() {
  const el = document.getElementById('archive-content');
  const disliked = allCards.filter(c => feedbackMap[c.message_id] === 'disliked');

  if (!disliked.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>הארכיון ריק</p></div>';
    return;
  }

  // Group by category
  const groups = {};
  disliked.forEach(c => {
    const cat = c.category || 'אחר';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(c);
  });

  el.innerHTML = Object.entries(groups).map(([cat, items]) => `
    <div class="section-title">${cat} (${items.length})</div>
    ${items.map(item => `
      <div class="archive-item" style="border-right:3px solid var(--hint)">
        <div class="archive-item-body">
          <div>
            <div style="font-size:12px;font-weight:600">${esc(extractSenderName(item.sender))}</div>
            <div style="font-size:11px;color:var(--muted)">${esc((item.deals?.[0]?.product || item.subject || '').slice(0, 50))}</div>
          </div>
          <button class="archive-restore" onclick="restoreCard('${item.message_id}')">↩ שחזר</button>
        </div>
      </div>`).join('')}
  `).join('');
}

function restoreCard(id) {
  delete feedbackMap[id];
  localStorage.setItem('feedback', JSON.stringify(feedbackMap));
  showToast('✅ שוחזר לדיגסט');
  renderArchive();
}

// ── Preferences ──
async function loadPreferences() {
  const el = document.getElementById('pref-list');
  el.innerHTML = '<div class="shimmer" style="height:200px;border-radius:12px"></div>';
  try {
    const data = await api('/preferences');
    const stats = data.stats || [];
    if (!stats.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🧠</div><p>לחץ 👍👎 כדי שאלמד</p></div>';
      return;
    }
    el.innerHTML = stats.map(p => {
      const ratio = p.total ? (p.likes / p.total) : 0.5;
      const color = ratio > 0.6 ? 'var(--green)' : ratio < 0.4 ? 'var(--red)' : 'var(--orange)';
      return `
        <div class="pref-row">
          <span style="font-size:12px;font-weight:600;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(extractSenderName(p.sender || ''))}</span>
          <div style="display:flex;gap:7px;align-items:center">
            <span style="font-size:11px;color:var(--green)">👍 ${p.likes || 0}</span>
            <span style="font-size:11px;color:var(--red)">👎 ${p.dislikes || 0}</span>
            <div class="pref-bar"><div class="pref-bar-fill" style="width:${Math.round(ratio * 100)}%;background:${color}"></div></div>
          </div>
        </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="empty-state"><p>שגיאה</p></div>';
  }
}

// ── Helpers ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'archive') renderArchive();
  if (name === 'prefs') loadPreferences();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showToastWithUndo(msg, onUndo) {
  const t = document.getElementById('toast');
  const undoId = 'undo_' + Date.now();
  window[undoId] = () => { onUndo(); t.classList.remove('show'); delete window[undoId]; };
  t.innerHTML = `<span class="toast-undo" onclick="window.${undoId}()">בטל</span>${msg}`;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); delete window[undoId]; }, 5000);
}

async function api(path, opts = {}) {
  const res = await fetch(WORKER + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
  });
  if (res.status === 401) { localStorage.removeItem('token'); location.reload(); }
  return res.json();
}

async function installApp() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').style.display = 'none';
}

function extractSenderName(sender) {
  if (!sender) return '';
  const match = sender.match(/^"?([^"<]+)"?\s*</);
  return match ? match[1].trim() : sender.split('@')[0];
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }
